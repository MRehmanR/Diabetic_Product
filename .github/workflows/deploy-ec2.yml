name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_BUSINESS_PHONE: ${{ secrets.VITE_BUSINESS_PHONE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend-check:
    name: Backend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/diabetic_buyback
      SECRET_KEY: ci-secret-key
      BACKEND_CORS_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Check backend Python syntax
        run: python -m compileall app

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - frontend-check
      - backend-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Validate required EC2 secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          test -n "$EC2_PROJECT_PATH"

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload optional environment files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_USER: ${{ secrets.EC2_USER }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          set -euo pipefail

          if [ -n "$FRONTEND_ENV" ]; then
            printf '%s\n' "$FRONTEND_ENV" > /tmp/frontend.env
            scp -i ~/.ssh/ec2_deploy_key -P "$EC2_PORT" /tmp/frontend.env "$EC2_USER@$EC2_HOST:/tmp/diabetic_product_frontend.env"
          fi

          if [ -n "$BACKEND_ENV" ]; then
            printf '%s\n' "$BACKEND_ENV" > /tmp/backend.env
            scp -i ~/.ssh/ec2_deploy_key -P "$EC2_PORT" /tmp/backend.env "$EC2_USER@$EC2_HOST:/tmp/diabetic_product_backend.env"
          fi

      - name: Deploy latest main on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PROJECT_PATH: ${{ secrets.EC2_PROJECT_PATH }}
          BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
          FRONTEND_RESTART_COMMAND: ${{ secrets.FRONTEND_RESTART_COMMAND }}
        run: |
          set -euo pipefail

          PROJECT_PATH_Q=$(printf '%q' "$EC2_PROJECT_PATH")
          BACKEND_RESTART_COMMAND_Q=$(printf '%q' "$BACKEND_RESTART_COMMAND")
          FRONTEND_RESTART_COMMAND_Q=$(printf '%q' "$FRONTEND_RESTART_COMMAND")

          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "PROJECT_PATH=$PROJECT_PATH_Q BACKEND_RESTART_COMMAND=$BACKEND_RESTART_COMMAND_Q FRONTEND_RESTART_COMMAND=$FRONTEND_RESTART_COMMAND_Q bash -se" <<'REMOTE'
          set -Eeuo pipefail

          cd "$PROJECT_PATH"

          git fetch origin main
          git reset --hard origin/main

          if [ -f /tmp/diabetic_product_frontend.env ]; then
            mv /tmp/diabetic_product_frontend.env frontend/.env
            chmod 600 frontend/.env
          fi

          if [ -f /tmp/diabetic_product_backend.env ]; then
            mv /tmp/diabetic_product_backend.env backend/.env
            chmod 600 backend/.env
          fi

          cd frontend
          npm ci
          npm run build

          cd ../backend
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          alembic upgrade head
          deactivate

          cd "$PROJECT_PATH"

          if [ -n "$BACKEND_RESTART_COMMAND" ]; then
            bash -lc "$BACKEND_RESTART_COMMAND"
          else
            echo "BACKEND_RESTART_COMMAND secret is empty; backend restart skipped."
          fi

          if [ -n "$FRONTEND_RESTART_COMMAND" ]; then
            bash -lc "$FRONTEND_RESTART_COMMAND"
          else
            echo "FRONTEND_RESTART_COMMAND secret is empty; frontend restart skipped."
          fi
          REMOTE
