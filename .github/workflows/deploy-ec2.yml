name: CI/CD Deploy to EC2

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: /api
      VITE_BUSINESS_PHONE: ${{ vars.VITE_BUSINESS_PHONE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Format frontend
        run: npm run format

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Verify production build
        run: |
          test -d dist
          find dist -maxdepth 3 -type f | sort

  backend-check:
    name: Backend check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diabetic_buyback
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d diabetic_buyback"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/diabetic_buyback
      SECRET_KEY: ci-only-secret-key
      ENVIRONMENT: testing
      BACKEND_CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      PUBLIC_UPLOAD_BASE_URL: http://localhost:8000/uploads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app

      - name: Check backend import
        run: python -c "from app.main import app; print(app.title)"

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q

  deploy:
    name: Deploy to production EC2
    runs-on: ubuntu-latest

    needs:
      - frontend-check
      - backend-check

    if: github.ref_name == 'main'

    environment:
      name: production
      url: https://diabeticking.com

    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_PORT: ${{ vars.EC2_PORT || '22' }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_PROJECT_PATH: ${{ vars.EC2_PROJECT_PATH }}
      VITE_BUSINESS_PHONE: ${{ vars.VITE_BUSINESS_PHONE }}

    steps:
      - name: Validate deployment configuration
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          set -euo pipefail

          missing=0

          require_value() {
            name="$1"
            value="$2"

            if [ -z "$value" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          }

          require_value "Repository variable EC2_HOST" "$EC2_HOST"
          require_value "Repository variable EC2_USER" "$EC2_USER"
          require_value "Repository variable EC2_PROJECT_PATH" "$EC2_PROJECT_PATH"
          require_value "Repository secret EC2_SSH_KEY" "$EC2_SSH_KEY"
          require_value "Repository secret BACKEND_ENV" "$BACKEND_ENV"

          if [ "$missing" -ne 0 ]; then
            echo "Add the missing values in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Configure SSH
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_PORT: ${{ vars.EC2_PORT || '22' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          umask 077

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key

          if [ -n "$EC2_KNOWN_HOSTS" ]; then
            printf '%s\n' "$EC2_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" > ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/known_hosts

      - name: Upload production environment files
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s\n' "$BACKEND_ENV" > /tmp/backend.env

          {
            printf 'VITE_API_URL=/api\n'
            printf 'VITE_BUSINESS_PHONE=%s\n' "$VITE_BUSINESS_PHONE"
          } > /tmp/frontend.env.production

          scp \
            -i ~/.ssh/ec2_deploy_key \
            -P "$EC2_PORT" \
            /tmp/backend.env \
            "$EC2_USER@$EC2_HOST:/tmp/diabetic-backend.env"

          scp \
            -i ~/.ssh/ec2_deploy_key \
            -P "$EC2_PORT" \
            /tmp/frontend.env.production \
            "$EC2_USER@$EC2_HOST:/tmp/diabetic-frontend.env.production"

          rm -f /tmp/backend.env /tmp/frontend.env.production

      - name: Deploy application
        run: |
          set -euo pipefail

          PROJECT_PATH_Q=$(printf '%q' "$EC2_PROJECT_PATH")

          ssh \
            -i ~/.ssh/ec2_deploy_key \
            -p "$EC2_PORT" \
            "$EC2_USER@$EC2_HOST" \
            "PROJECT_PATH=$PROJECT_PATH_Q bash -se" <<'REMOTE'
          set -Eeuo pipefail

          export NVM_DIR="$HOME/.nvm"

          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            echo "NVM is not installed on EC2."
            exit 1
          fi

          . "$NVM_DIR/nvm.sh"
          nvm use 22 >/dev/null

          UV="$HOME/.local/bin/uv"

          if [ ! -x "$UV" ]; then
            echo "uv is not installed at $UV."
            exit 1
          fi

          cd "$PROJECT_PATH"

          git fetch --prune origin main
          git reset --hard origin/main

          install -m 600 \
            /tmp/diabetic-backend.env \
            backend/.env

          install -m 600 \
            /tmp/diabetic-frontend.env.production \
            frontend/.env.production

          rm -f \
            /tmp/diabetic-backend.env \
            /tmp/diabetic-frontend.env.production

          # Backend
          cd "$PROJECT_PATH/backend"

          if [ ! -x .venv/bin/python ]; then
            "$UV" venv --python 3.13 .venv
          fi

          if ! .venv/bin/python -c \
            'import sys; assert sys.version_info[:2] == (3, 13)'; then
            rm -rf .venv
            "$UV" venv --python 3.13 .venv
          fi

          "$UV" pip install \
            --python .venv/bin/python \
            -r requirements.txt

          .venv/bin/alembic upgrade head

          # Frontend
          cd "$PROJECT_PATH/frontend"

          npm ci || npm install
          rm -rf dist
          npm run build

          test -d dist
          find dist -maxdepth 3 -type f | sort

          # Restart services
          sudo systemctl restart diabetic-backend
          sudo systemctl restart diabetic-frontend

          sudo nginx -t
          sudo systemctl reload nginx

          # Local health checks
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 2 \
            --retry-all-errors \
            http://127.0.0.1:8000/health

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 2 \
            --retry-all-errors \
            http://127.0.0.1:3000/ \
            >/dev/null

          # Public health check
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 2 \
            --retry-all-errors \
            https://diabeticking.com/health

          echo "Deployment completed successfully."
          REMOTE
